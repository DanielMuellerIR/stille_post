name: Sparkle-Appcast veröffentlichen

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Bereits veröffentlichtes Release-Tag, zum Beispiel v0.8.5
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sparkle-appcast
  cancel-in-progress: false

jobs:
  appcast:
    runs-on: macos-15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Quelltext auschecken
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: GitHub Pages vorbereiten
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Release-DMG und Release Notes laden
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p update site
          gh release download "$RELEASE_TAG" --pattern '*.dmg' --dir update

          shopt -s nullglob
          dmgs=(update/*.dmg)
          if (( ${#dmgs[@]} != 1 )); then
            echo "FEHLER: Release $RELEASE_TAG muss genau ein DMG enthalten." >&2
            exit 1
          fi

          # Gleicher Basisname: generate_appcast ordnet die Markdown-Datei dem DMG zu.
          gh release view "$RELEASE_TAG" --json body --jq .body > "${dmgs[0]%.dmg}.md"

      - name: Developer-ID und Notarisierung des Releases prüfen
        shell: bash
        env:
          EXPECTED_TEAM_ID: ${{ vars.DEVELOPER_TEAM_ID }}
        run: |
          set -euo pipefail
          dmg=(update/*.dmg)
          scripts/verify-release.sh "${dmg[0]}" "$RELEASE_TAG" "$EXPECTED_TEAM_ID"

      - name: Sparkle-Werkzeug vorbereiten
        id: sparkle
        shell: bash
        run: |
          set -euo pipefail
          swift package resolve
          tool="$(find .build/artifacts/sparkle -type f -name generate_appcast -print -quit)"
          if [[ -z "$tool" ]]; then
            echo "FEHLER: Sparkles generate_appcast wurde nicht gefunden." >&2
            exit 1
          fi
          echo "tool=$tool" >> "$GITHUB_OUTPUT"

      - name: Signierten Appcast erzeugen
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "FEHLER: GitHub-Secret SPARKLE_PRIVATE_KEY fehlt." >&2
            exit 1
          fi

          # Der geheime Schlüssel steht weder in argv noch in einer Datei oder im Log.
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "${{ steps.sparkle.outputs.tool }}" \
            --ed-key-file - \
            --embed-release-notes \
            --maximum-versions 1 \
            --maximum-deltas 0 \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            -o "$PWD/site/appcast.xml" \
            "$PWD/update"

          unset SPARKLE_PRIVATE_KEY
          xmllint --noout site/appcast.xml

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

      - name: Appcast auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
